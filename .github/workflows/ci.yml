name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:main

      - name: Build application
        run: npm run build:dir
